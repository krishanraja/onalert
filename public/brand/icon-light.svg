<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bullseye: white outer ring -->
  <circle cx="52" cy="60" r="42" fill="white"/>
  <!-- Bullseye: dark inner ring (cutout effect) -->
  <circle cx="52" cy="60" r="26" fill="#1A1A1A"/>
  <!-- Bullseye: white center ring -->
  <circle cx="52" cy="60" r="16" fill="white"/>
  <!-- Bullseye: dark center dot -->
  <circle cx="52" cy="60" r="7" fill="#1A1A1A"/>
  <!-- Signal arcs (red/crimson) -->
  <path d="M92 42 C99 49, 99 55, 92 62" stroke="#9F0506" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M100 35 C110 45, 110 59, 100 69" stroke="#9F0506" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M108 28 C121 41, 121 63, 108 76" stroke="#9F0506" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
