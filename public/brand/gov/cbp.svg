<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="white">
  <!-- CBP Patch: Shield/badge shape with eagle -->
  <!-- Outer shield shape -->
  <path d="M100,8 L175,45 L175,135 Q175,185 100,212 Q25,185 25,135 L25,45 Z"
        fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Inner shield shape -->
  <path d="M100,18 L165,50 L165,132 Q165,178 100,202 Q35,178 35,132 L35,50 Z"
        fill="none" stroke="white" stroke-width="1"/>

  <!-- Text along top -->
  <defs>
    <path id="cbpTop" d="M50,65 Q100,30 150,65" fill="none"/>
    <path id="cbpBottom" d="M45,170 Q100,210 155,170" fill="none"/>
  </defs>
  <text font-family="serif" font-size="9" font-weight="bold" letter-spacing="2" fill="white">
    <textPath href="#cbpTop" startOffset="50%" text-anchor="middle">U.S. CUSTOMS AND</textPath>
  </text>
  <text font-family="serif" font-size="9" font-weight="bold" letter-spacing="1.5" fill="white">
    <textPath href="#cbpBottom" startOffset="50%" text-anchor="middle">BORDER PROTECTION</textPath>
  </text>

  <!-- Inner circle -->
  <circle cx="100" cy="115" r="45" fill="none" stroke="white" stroke-width="1"/>

  <!-- Eagle silhouette inside circle -->
  <g transform="translate(100,110)" fill="white">
    <!-- Eagle body -->
    <ellipse cx="0" cy="2" rx="10" ry="13"/>
    <!-- Eagle head -->
    <circle cx="0" cy="-14" r="6"/>
    <!-- Beak -->
    <polygon points="6,-14 10,-12 6,-11"/>
    <!-- Left wing -->
    <path d="M-10,-2 Q-28,-20 -38,-14 Q-30,-8 -10,3 Z"/>
    <!-- Right wing -->
    <path d="M10,-2 Q28,-20 38,-14 Q30,-8 10,3 Z"/>
    <!-- Tail -->
    <path d="M-6,14 L0,24 L6,14 Q0,18 -6,14 Z"/>
    <!-- Shield on chest -->
    <rect x="-5" y="-7" width="10" height="13" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="-5" y1="-2" x2="5" y2="-2" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Stars -->
  <g fill="white" font-size="7" font-family="serif" text-anchor="middle">
    <text x="100" y="73">★</text>
    <text x="65" y="82">★</text>
    <text x="135" y="82">★</text>
  </g>
</svg>