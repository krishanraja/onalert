<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="white">
  <!-- DHS Seal: Outer ring with text, inner circle with eagle -->
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="1"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Text along top arc: U.S. DEPARTMENT OF -->
  <defs>
    <path id="topArc" d="M 100,100 m -80,0 a 80,80 0 1,1 160,0" fill="none"/>
    <path id="bottomArc" d="M 20,100 a 80,80 0 0,0 160,0" fill="none"/>
  </defs>
  <text font-family="serif" font-size="10.5" font-weight="bold" letter-spacing="3.5" fill="white">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">U.S. DEPARTMENT OF</textPath>
  </text>
  <text font-family="serif" font-size="11.5" font-weight="bold" letter-spacing="4" fill="white">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">HOMELAND SECURITY</textPath>
  </text>

  <!-- Five-pointed star decorations -->
  <g fill="white">
    <polygon points="21,100 23,95 25,100 23,105" transform="rotate(0,23,100)"/>
    <polygon points="175,100 177,95 179,100 177,105" transform="rotate(0,177,100)"/>
  </g>

  <!-- Inner eagle silhouette (simplified DHS eagle) -->
  <g transform="translate(100,95)" fill="white">
    <!-- Eagle body -->
    <ellipse cx="0" cy="5" rx="12" ry="16"/>
    <!-- Eagle head -->
    <circle cx="0" cy="-16" r="7"/>
    <!-- Beak -->
    <polygon points="7,-16 12,-14 7,-13"/>
    <!-- Left wing -->
    <path d="M-12,-2 Q-35,-25 -50,-18 Q-40,-10 -12,5 Z"/>
    <!-- Right wing -->
    <path d="M12,-2 Q35,-25 50,-18 Q40,-10 12,5 Z"/>
    <!-- Tail feathers -->
    <path d="M-8,20 L0,32 L8,20 Q0,24 -8,20 Z"/>
    <!-- Shield on chest -->
    <rect x="-6" y="-8" width="12" height="16" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="white" stroke-width="1"/>
    <!-- Legs/talons -->
    <line x1="-5" y1="18" x2="-12" y2="26" stroke="white" stroke-width="1.5"/>
    <line x1="5" y1="18" x2="12" y2="26" stroke="white" stroke-width="1.5"/>
    <line x1="-14" y1="25" x2="-10" y2="27" stroke="white" stroke-width="1"/>
    <line x1="14" y1="25" x2="10" y2="27" stroke="white" stroke-width="1"/>
  </g>

  <!-- Small stars around the inner ring -->
  <g fill="white" font-family="serif" font-size="8">
    <text x="100" y="33" text-anchor="middle">★</text>
  </g>
</svg>