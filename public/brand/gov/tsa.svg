<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="white">
  <!-- TSA Logo: Eagle with spread wings and TSA text -->
  <!-- Outer circle -->
  <circle cx="120" cy="100" r="95" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="120" cy="100" r="86" fill="none" stroke="white" stroke-width="1"/>

  <!-- Text arcs -->
  <defs>
    <path id="tsaTop" d="M120,100 m-78,0 a78,78 0 1,1 156,0" fill="none"/>
    <path id="tsaBottom" d="M42,100 a78,78 0 0,0 156,0" fill="none"/>
  </defs>
  <text font-family="serif" font-size="8.5" font-weight="bold" letter-spacing="3" fill="white">
    <textPath href="#tsaTop" startOffset="50%" text-anchor="middle">TRANSPORTATION SECURITY</textPath>
  </text>
  <text font-family="serif" font-size="9.5" font-weight="bold" letter-spacing="5" fill="white">
    <textPath href="#tsaBottom" startOffset="50%" text-anchor="middle">ADMINISTRATION</textPath>
  </text>

  <!-- Divider stars -->
  <g fill="white" font-size="6" font-family="serif">
    <text x="36" y="103" text-anchor="middle">★</text>
    <text x="204" y="103" text-anchor="middle">★</text>
  </g>

  <!-- Inner ring -->
  <circle cx="120" cy="97" r="55" fill="none" stroke="white" stroke-width="1"/>

  <!-- Eagle silhouette -->
  <g transform="translate(120,92)" fill="white">
    <!-- Eagle body -->
    <ellipse cx="0" cy="3" rx="11" ry="15"/>
    <!-- Eagle head -->
    <circle cx="0" cy="-16" r="6.5"/>
    <!-- Beak -->
    <polygon points="6.5,-16 11,-14 6.5,-13"/>
    <!-- Left wing (spread wide) -->
    <path d="M-11,-3 Q-32,-28 -46,-20 Q-36,-12 -11,4 Z"/>
    <!-- Right wing (spread wide) -->
    <path d="M11,-3 Q32,-28 46,-20 Q36,-12 11,4 Z"/>
    <!-- Tail feathers -->
    <path d="M-7,17 L0,28 L7,17 Q0,22 -7,17 Z"/>
    <!-- Shield on chest -->
    <path d="M-6,-8 L-6,7 Q0,11 6,7 L6,-8 Z" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="-6" y1="-3" x2="6" y2="-3" stroke="white" stroke-width="0.8"/>
    <!-- Vertical stripes on shield bottom -->
    <line x1="-3" y1="-3" x2="-3" y2="6" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="-3" x2="0" y2="8" stroke="white" stroke-width="0.5"/>
    <line x1="3" y1="-3" x2="3" y2="6" stroke="white" stroke-width="0.5"/>
    <!-- Olive branch (left talon) -->
    <path d="M-6,16 Q-15,22 -18,28" fill="none" stroke="white" stroke-width="1.2"/>
    <ellipse cx="-16" cy="23" rx="3" ry="1.5" transform="rotate(-30,-16,23)"/>
    <!-- Arrows (right talon) -->
    <line x1="6" y1="16" x2="18" y2="28" stroke="white" stroke-width="1.2"/>
    <line x1="8" y1="16" x2="20" y2="26" stroke="white" stroke-width="1"/>
    <line x1="10" y1="16" x2="22" y2="24" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Stars above eagle head -->
  <g fill="white" font-size="5" font-family="serif" text-anchor="middle">
    <text x="108" y="48">★</text>
    <text x="115" y="44">★</text>
    <text x="120" y="42">★</text>
    <text x="125" y="44">★</text>
    <text x="132" y="48">★</text>
  </g>
</svg>